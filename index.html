<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#05070a" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Spectro Live Pro</title>
  <style>
    :root { --bg:#05070a; --panel:#10151f; --text:#f4f7fb; --muted:#8d9aad; --line:#243142; }
    * { box-sizing: border-box; }
    body { margin:0; background:radial-gradient(circle at top,#172235 0,#05070a 48%); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,Arial,sans-serif; padding:14px; }
    h1 { margin:0 0 6px; font-size:28px; letter-spacing:-.04em; }
    p { color:var(--muted); margin:0 0 12px; line-height:1.35; }
    .card { background:rgba(16,21,31,.85); border:1px solid var(--line); border-radius:22px; padding:14px; backdrop-filter:blur(12px); }
    .controls,.settings { display:grid; gap:10px; margin:12px 0; }
    .controls { grid-template-columns:1fr 1fr; }
    .settings { grid-template-columns:1fr 1fr; }
    button, select {
      border-radius:14px; border:1px solid #334357; background:#0b1018; color:var(--text); padding:14px 12px; font-size:15px;
    }
    button.primary { background:linear-gradient(135deg,#e9f7ff,#8ad9ff); color:#061017; border:none; font-weight:800; }
    .metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:12px 0; }
    .metric { background:#0b1018; border:1px solid #1f2b3a; border-radius:16px; padding:12px; }
    .metric span { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.08em; }
    .metric b { display:block; margin-top:4px; font-size:20px; }
    .wrap { position:relative; margin-top:10px; }
    canvas { display:block; width:100%; background:#030508; border:1px solid #1e2a38; border-radius:16px; }
    #spectrum { height:170px; }
    #spectrogram { height:520px; }
    .axis {
      position:absolute; left:0; top:0; right:0; bottom:0; pointer-events:none; color:#9db0c8; font-size:11px;
    }
    .hz-label { position:absolute; right:8px; transform:translateY(50%); background:rgba(3,5,8,.5); padding:1px 4px; border-radius:6px; }
    .xlabels { display:flex; justify-content:space-between; color:#9db0c8; font-size:11px; margin-top:4px; padding:0 4px; }
  </style>
</head>
<body>
  <h1>Spectro Live Pro</h1>
  <p>Version plus précise pour repérer des patterns : zoom fréquentiel, pic dominant, curseur, spectrogramme plus fin.</p>

  <section class="card">
    <div class="controls">
      <button id="start" class="primary">Démarrer</button>
      <button id="stop">Stop</button>
    </div>

    <div class="settings">
      <select id="range">
        <option value="4000">Zoom 0–4 kHz</option>
        <option value="8000" selected>Zoom 0–8 kHz</option>
        <option value="12000">Zoom 0–12 kHz</option>
        <option value="20000">Zoom 0–20 kHz</option>
      </select>
      <select id="fft">
        <option value="4096">FFT 4096</option>
        <option value="8192" selected>FFT 8192</option>
        <option value="16384">FFT 16384</option>
      </select>
    </div>

    <div class="metrics">
      <div class="metric"><span>Pic dominant</span><b id="peak">—</b></div>
      <div class="metric"><span>Curseur</span><b id="cursor">—</b></div>
      <div class="metric"><span>Niveau</span><b id="level">—</b></div>
    </div>

    <div class="wrap">
      <canvas id="spectrum" width="1200" height="300"></canvas>
      <div class="axis" id="spectrumAxis"></div>
    </div>
    <div class="xlabels"><span>0 s</span><span>temps →</span></div>

    <div class="wrap" style="margin-top:14px;">
      <canvas id="spectrogram" width="1200" height="1000"></canvas>
      <div class="axis" id="spectroAxis"></div>
    </div>
  </section>

<script>
let audioCtx, analyser, source, stream, raf;
const startBtn = document.getElementById("start"), stopBtn = document.getElementById("stop");
const peakEl = document.getElementById("peak"), cursorEl = document.getElementById("cursor"), levelEl = document.getElementById("level");
const spectrum = document.getElementById("spectrum"), spectrogram = document.getElementById("spectrogram");
const sctx = spectrum.getContext("2d"), gctx = spectrogram.getContext("2d");
const rangeSel = document.getElementById("range"), fftSel = document.getElementById("fft");
let maxHz = 8000, currentData = null, nyquist = 24000;

function colorFor(v){
  const x=v/255;
  const r=Math.floor(255*Math.min(1,Math.max(0,2.5*x-.55)));
  const g=Math.floor(255*Math.min(1,Math.max(0,2.3*x-.2)));
  const b=Math.floor(255*Math.min(1,Math.max(0,1.8-2.5*x)));
  return `rgb(${r},${g},${b})`;
}
function drawAxes(el, hzMax){
  el.innerHTML="";
  const ticks = hzMax<=4000 ? [0,500,1000,1500,2000,3000,4000] :
                hzMax<=8000 ? [0,1000,2000,3000,4000,6000,8000] :
                hzMax<=12000 ? [0,2000,4000,6000,8000,10000,12000] :
                              [0,4000,8000,12000,16000,20000];
  ticks.forEach(hz=>{
    const y = (1 - hz/hzMax) * 100;
    const d = document.createElement("div");
    d.className="hz-label";
    d.style.top=`calc(${y}% - 6px)`;
    d.textContent = hz>=1000 ? (hz/1000)+" kHz" : hz+" Hz";
    el.appendChild(d);
  });
}
drawAxes(document.getElementById("spectroAxis"), maxHz);

async function start(){
  stop();
  maxHz = +rangeSel.value;
  stream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  await audioCtx.resume();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = +fftSel.value;
  analyser.smoothingTimeConstant = 0.35;
  analyser.minDecibels = -110;
  analyser.maxDecibels = -20;
  source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);
  nyquist = audioCtx.sampleRate/2;
  drawAxes(document.getElementById("spectroAxis"), maxHz);
  draw();
}
function stop(){
  if(raf) cancelAnimationFrame(raf);
  if(stream) stream.getTracks().forEach(t=>t.stop());
  if(audioCtx && audioCtx.state!=="closed") audioCtx.close();
}
function draw(){
  const bins = analyser.frequencyBinCount;
  const data = new Uint8Array(bins);
  analyser.getByteFrequencyData(data);
  currentData = data;
  const maxBin = Math.min(bins-1, Math.floor((maxHz/nyquist)*bins));

  let peakBin=1, peakVal=0, sum=0;
  for(let i=1;i<maxBin;i++){ const v=data[i]; sum+=v; if(v>peakVal){peakVal=v; peakBin=i;} }
  const peakHz = Math.round(peakBin*nyquist/bins);
  const avg = sum/maxBin;
  const db = Math.round(-110 + (avg/255)*90);
  peakEl.textContent = peakVal>8 ? `${peakHz} Hz` : "—";
  levelEl.textContent = `${db} dB`;

  sctx.fillStyle="#030508"; sctx.fillRect(0,0,spectrum.width,spectrum.height);
  sctx.strokeStyle="#243142"; sctx.lineWidth=1;
  for(let hz=0; hz<=maxHz; hz += maxHz<=4000?500:maxHz<=8000?1000:2000){
    const y=(1-hz/maxHz)*spectrum.height;
    sctx.beginPath(); sctx.moveTo(0,y); sctx.lineTo(spectrum.width,y); sctx.stroke();
  }

  sctx.beginPath();
  for(let x=0;x<spectrum.width;x++){
    const bin = Math.floor((x/spectrum.width)*maxBin);
    const v = data[bin]/255;
    const y = spectrum.height - v*spectrum.height;
    if(x===0) sctx.moveTo(x,y); else sctx.lineTo(x,y);
  }
  sctx.strokeStyle="#8ad9ff"; sctx.lineWidth=2; sctx.stroke();

  const img = gctx.getImageData(1,0,spectrogram.width-1,spectrogram.height);
  gctx.putImageData(img,0,0);
  for(let y=0;y<spectrogram.height;y++){
    const hz = (1-y/spectrogram.height)*maxHz;
    const bin = Math.min(maxBin-1, Math.floor((hz/nyquist)*bins));
    const v = data[bin];
    gctx.fillStyle = colorFor(v);
    gctx.fillRect(spectrogram.width-1,y,1,1);
  }

  raf = requestAnimationFrame(draw);
}
spectrum.addEventListener("mousemove", e=>{
  if(!currentData || !audioCtx) return;
  const rect = spectrum.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const hz = Math.round((x/rect.width)*maxHz);
  const bin = Math.floor((hz/nyquist)*currentData.length);
  const v = currentData[Math.max(0,Math.min(currentData.length-1,bin))];
  cursorEl.textContent = `${hz} Hz • ${v}`;
});
spectrum.addEventListener("touchmove", e=>{
  const t=e.touches[0]; if(!t||!currentData||!audioCtx) return;
  const rect = spectrum.getBoundingClientRect();
  const x = t.clientX - rect.left;
  const hz = Math.round((x/rect.width)*maxHz);
  const bin = Math.floor((hz/nyquist)*currentData.length);
  const v = currentData[Math.max(0,Math.min(currentData.length-1,bin))];
  cursorEl.textContent = `${hz} Hz • ${v}`;
},{passive:true});

startBtn.onclick=()=>start().catch(err=>alert("Micro inaccessible : "+err.message));
stopBtn.onclick=stop;
rangeSel.onchange=()=>{maxHz=+rangeSel.value; drawAxes(document.getElementById("spectroAxis"), maxHz);}
fftSel.onchange=()=>{ if(stream) start(); };

if("serviceWorker" in navigator){ navigator.serviceWorker.register("./sw.js").catch(()=>{}); }
</script>
</body>
</html>
