<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#05070a" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Spectro Live</title>
  <style>
    :root { --bg:#05070a; --panel:#10151f; --text:#f4f7fb; --muted:#8d9aad; --line:#243142; }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100vh; background:radial-gradient(circle at top,#172235 0,#05070a 48%);
      color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,Arial,sans-serif;
      display:flex; flex-direction:column; padding:18px;
    }
    header { padding: 12px 0 18px; }
    h1 { margin:0; font-size:30px; letter-spacing:-.04em; }
    p { color:var(--muted); margin:8px 0 0; line-height:1.35; }
    .card {
      background:rgba(16,21,31,.82); border:1px solid var(--line); border-radius:22px;
      padding:14px; box-shadow:0 20px 60px rgba(0,0,0,.35); backdrop-filter:blur(14px);
    }
    .controls { display:flex; gap:10px; margin:14px 0; }
    button {
      flex:1; border:0; border-radius:16px; padding:15px 16px; color:#061017;
      font-weight:800; font-size:16px; background:linear-gradient(135deg,#e9f7ff,#8ad9ff);
    }
    button.stop { background:#202b3a; color:var(--text); border:1px solid #334357; }
    .metrics {
      display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px;
    }
    .metric { background:#0b1018; border:1px solid #1f2b3a; border-radius:16px; padding:12px; }
    .metric b { display:block; font-size:22px; margin-top:4px; }
    .metric span { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
    canvas { width:100%; display:block; background:#030508; border-radius:16px; border:1px solid #1e2a38; }
    #spectrum { height:120px; margin-bottom:12px; }
    #spectrogram { height:440px; }
    footer { color:var(--muted); font-size:12px; padding:14px 4px 0; }
  </style>
</head>
<body>
  <header>
    <h1>Spectro Live</h1>
    <p>Analyse spectrale temps réel depuis le micro de l’iPhone. À installer via Safari → Partager → Sur l’écran d’accueil.</p>
  </header>

  <section class="card">
    <div class="controls">
      <button id="start">Démarrer le micro</button>
      <button id="stop" class="stop">Stop</button>
    </div>

    <div class="metrics">
      <div class="metric"><span>Pic dominant</span><b id="peak">— Hz</b></div>
      <div class="metric"><span>Niveau</span><b id="level">— dB</b></div>
    </div>

    <canvas id="spectrum" width="900" height="240"></canvas>
    <canvas id="spectrogram" width="900" height="900"></canvas>
  </section>

  <footer>
    Astuce : approche l’iPhone de la source sonore. Les graves sont en bas, les aigus en haut. Version locale, sans envoi audio.
  </footer>

<script>
let audioCtx, analyser, source, stream, raf;
const startBtn = document.getElementById("start");
const stopBtn = document.getElementById("stop");
const peakEl = document.getElementById("peak");
const levelEl = document.getElementById("level");
const spectrum = document.getElementById("spectrum");
const spectrogram = document.getElementById("spectrogram");
const sctx = spectrum.getContext("2d");
const gctx = spectrogram.getContext("2d");

function colorFor(v) {
  // v: 0..255, palette maison sans lib externe
  const x = v / 255;
  const r = Math.floor(255 * Math.min(1, Math.max(0, 2.4*x - .55)));
  const g = Math.floor(255 * Math.min(1, Math.max(0, 2.2*x - .18)));
  const b = Math.floor(255 * Math.min(1, Math.max(0, 1.7 - 2.4*x)));
  return `rgb(${r},${g},${b})`;
}

async function start() {
  stop();
  stream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false },
    video: false
  });

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  await audioCtx.resume();

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 4096;
  analyser.smoothingTimeConstant = 0.55;
  analyser.minDecibels = -105;
  analyser.maxDecibels = -20;

  source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);

  draw();
}

function stop() {
  if (raf) cancelAnimationFrame(raf);
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (audioCtx && audioCtx.state !== "closed") audioCtx.close();
  stream = null; audioCtx = null; analyser = null;
  peakEl.textContent = "— Hz";
  levelEl.textContent = "— dB";
}

function draw() {
  const bins = analyser.frequencyBinCount;
  const data = new Uint8Array(bins);
  analyser.getByteFrequencyData(data);

  const nyquist = audioCtx.sampleRate / 2;
  const maxHz = Math.min(12000, nyquist);
  const maxBin = Math.floor(maxHz / nyquist * bins);

  let peakBin = 0, peakVal = 0, sum = 0;
  for (let i = 1; i < maxBin; i++) {
    const v = data[i];
    sum += v;
    if (v > peakVal) { peakVal = v; peakBin = i; }
  }
  const peakHz = Math.round(peakBin * nyquist / bins);
  const avg = sum / maxBin;
  const db = Math.round(-105 + (avg / 255) * 85);

  peakEl.textContent = peakVal > 8 ? `${peakHz} Hz` : "— Hz";
  levelEl.textContent = `${db} dB`;

  // Spectrum bars
  sctx.clearRect(0,0,spectrum.width,spectrum.height);
  sctx.fillStyle = "#030508";
  sctx.fillRect(0,0,spectrum.width,spectrum.height);
  const bars = 160;
  const barW = spectrum.width / bars;
  for (let x = 0; x < bars; x++) {
    const bin = Math.floor((x / bars) * maxBin);
    const v = data[bin];
    const h = (v / 255) * spectrum.height;
    sctx.fillStyle = colorFor(v);
    sctx.fillRect(x * barW, spectrum.height - h, Math.max(1, barW - 1), h);
  }

  // Scroll spectrogram one pixel left
  const img = gctx.getImageData(1, 0, spectrogram.width - 1, spectrogram.height);
  gctx.putImageData(img, 0, 0);
  gctx.fillStyle = "#030508";
  gctx.fillRect(spectrogram.width - 1, 0, 1, spectrogram.height);

  for (let y = 0; y < spectrogram.height; y++) {
    const ratio = 1 - y / spectrogram.height;
    const bin = Math.floor(ratio * maxBin);
    const v = data[bin];
    gctx.fillStyle = colorFor(v);
    gctx.fillRect(spectrogram.width - 1, y, 1, 1);
  }

  raf = requestAnimationFrame(draw);
}

startBtn.onclick = () => start().catch(err => alert("Micro inaccessible : " + err.message));
stopBtn.onclick = stop;

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}
</script>
</body>
</html>
